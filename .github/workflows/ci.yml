name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    name: Build & Test
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Go vet
        run: go vet ./...

      - name: Run tests
        run: go test -count=1 ./...

      - name: Build
        run: go build -o /dev/null ./cmd/glyra
