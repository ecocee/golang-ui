name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.2.0-beta.1)'
        required: true
        default: 'v0.2.0-beta.1'

permissions:
  contents: write

jobs:
  # ---------------------------------------------------------------
  # Build matrix: one job per (os, arch)
  # ---------------------------------------------------------------
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS
          - target: darwin-arm64
            runner: macos-14
            goos: darwin
            goarch: arm64
          - target: darwin-amd64
            runner: macos-14
            goos: darwin
            goarch: amd64
          # Linux
          - target: linux-amd64
            runner: ubuntu-22.04
            goos: linux
            goarch: amd64
          - target: linux-arm64
            runner: ubuntu-22.04-arm
            goos: linux
            goarch: arm64
          # Windows
          - target: windows-amd64
            runner: windows-2022
            goos: windows
            goarch: amd64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Verify Go module
        run: |
          go mod verify
          go build ./...

      - name: Run tests
        run: go test -count=1 ./...

      - name: Build binary
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          VERSION="${{ github.ref_name }}"
          if [ -z "$VERSION" ] || [ "$VERSION" = "refs/heads/main" ]; then
            VERSION="${{ github.event.inputs.tag }}"
          fi
          if [ -z "$VERSION" ]; then
            VERSION="v0.0.0-dev"
          fi

          OUTPUT="glyra-${{ matrix.target }}"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            OUTPUT="${OUTPUT}.exe"
          fi

          echo "Building $OUTPUT for $GOOS/$GOARCH (version $VERSION)"

          go build \
            -ldflags="-s -w -X github.com/ecocee/golang-ui/internal/cli.Version=$VERSION" \
            -o "dist/$OUTPUT" \
            ./cmd/glyra

          # Also archive as tarball / zip for convenience
          mkdir -p "release"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            cd dist && zip "../release/glyra-${{ matrix.target }}.zip" "$OUTPUT"
          else
            cd dist && tar czf "../release/glyra-${{ matrix.target }}.tar.gz" "$OUTPUT"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: glyra-${{ matrix.target }}
          path: release/glyra-${{ matrix.target }}.*
          retention-days: 30

  # ---------------------------------------------------------------
  # Create / update the GitHub release once all builds finish
  # ---------------------------------------------------------------
  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: glyra-*

      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.name }}
          name: Glyra ${{ steps.tag.name }} (Beta)
          body: |
            ## Glyra ${{ steps.tag.name }}

            Automated **beta** release built from `${{ github.ref }}`.

            ### Platforms
            | Asset              | OS        | Arch    |
            |-------------------|-----------|---------|
            | `glyra-darwin-arm64.tar.gz`  | macOS     | Apple Silicon (M1/M2/M3) |
            | `glyra-darwin-amd64.tar.gz`  | macOS     | Intel (x86_64) |
            | `glyra-linux-amd64.tar.gz`   | Linux     | x86_64 |
            | `glyra-linux-arm64.tar.gz`   | Linux     | ARM64 |
            | `glyra-windows-amd64.zip`    | Windows   | x86_64 |

            ### Install
            ```bash
            # macOS / Linux
            tar xzf glyra-<platform>.tar.gz
            ./glyra --version

            # Windows
            Expand-Archive glyra-windows-amd64.zip .
            .\glyra.exe --version
            ```

            ### Quick start
            ```bash
            glyra init my-app
            cd my-app
            glyra dev
            ```

            > **Beta notice:** this release is still under active development. APIs may change between beta versions.
          draft: false
          prerelease: true
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
